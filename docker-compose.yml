services:
  postgres:
    image: postgres:16-alpine
    container_name: easysaving-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-easysaving}
    ports:
      - "5432:5432"
    volumes:
      - easysaving_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-easysaving}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easysaving-backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:-host=postgres user=postgres password=postgres dbname=easysaving port=5432 sslmode=disable TimeZone=Asia/Bangkok}
    ports:
      - "18080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18080/api/v1}
    container_name: easysaving-frontend
    working_dir: /app
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18080/api/v1}
    ports:
      - "3000:3000"

volumes:
  easysaving_pg:
